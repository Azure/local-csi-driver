repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
    exclude: dist
  - id: check-yaml
    args:
    - --allow-multiple-documents
    exclude: charts/latest/templates # chart templates are not valid yaml
  - id: check-xml
  - id: check-json
- repo: https://github.com/golangci/golangci-lint
  rev: 8f3b0c7ed018e57905fbd873c697e0b1ede605a5 # v2.11.4
  hooks:
  - id: golangci-lint-full
- repo: https://github.com/hadolint/hadolint
  rev: 57e1618d78fd469a92c1e584e8c9313024656623 # v2.14.0
  hooks:
    - id: hadolint-docker
- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e # v0.48.0
  hooks:
  - id: markdownlint-fix-docker
- repo: https://github.com/pycqa/flake8
  rev: c48217e1fc006c2dddd14df54e83b67da15de5cd # 7.3.0
  hooks:
  - id: flake8
- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # v2.4.2
  hooks:
  - id: codespell
    args:
    - --config=.codespellrc
- repo: https://github.com/rhysd/actionlint
  rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
  hooks:
  - id: actionlint-docker
- repo: https://github.com/tcort/markdown-link-check
  rev: 3a8992dcbb083a248671812c7027b6995ef88523 # v3.14.2
  hooks:
    - id: markdown-link-check
      args: [--verbose, --config, .markdown-links-config.json]
- repo: local
  hooks:
  - id: bicep-lint
    name: bicep file linter
    entry: make bicep-lint
    language: system
    files: ^.*\.bicep$
    pass_filenames: false
  - id: addcopyright
    name: Add copyright header
    entry: make add-copyright
    language: system
    files: ^.*\.(go|sh|mk|py)$
    pass_filenames: false
  - id: kubeconform-lint
    name: Lint Helm Chart
    entry: make kubeconform-lint
    language: system
    files: ^charts/latest
    pass_filenames: false
- repo: https://github.com/koalaman/shellcheck-precommit
  rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d # v0.11.0
  hooks:
  - id: shellcheck
