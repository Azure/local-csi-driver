name: Docker Build Template

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ''
      registry:
        description: 'Container registry URL'
        required: true
        type: string
      repo_base:
        description: 'Repository base path'
        required: true
        type: string
      version:
        description: 'Version tag for the image'
        required: true
        type: string
      tags:
        description: 'Image tags (YAML array)'
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read
  id-token: write


jobs:
  build-docker:
    strategy:
      matrix:
        image:
          - name: local-csi-driver
            dockerfile: Dockerfile
          - name: local-csi-manager
            dockerfile: Dockerfile.manager
        arch:
          - runs-on: ubuntu-latest
            platforms: linux/amd64
            tag-suffix: amd64
          - runs-on: ubuntu-24.04-arm
            platforms: linux/arm64
            tag-suffix: arm64
    runs-on: ${{ matrix.arch.runs-on }}
    environment: pull-request
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Azure CLI Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login -n ${{ inputs.registry }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate NOTICE.txt
        run: make notice

      - name: Set build date
        id: build-date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: set-tags
        run: |
          set -eou pipefail
          tags=()
          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi
            tags+=("${{ inputs.registry }}/${{ inputs.repo_base }}/${{ matrix.image.name }}:${tag}-${{ matrix.arch.tag-suffix }}")
          done <<< "${{ inputs.tags }}"

          echo "tags=$(IFS=,; echo "${tags[*]}")" >> "$GITHUB_OUTPUT"

      - name: Docker build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.set-tags.outputs.tags }}
          platforms: ${{ matrix.arch.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ID=${{ github.run_id }}
            VERSION=${{ inputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.date }}

  push-manifest:
    needs: build-docker
    runs-on: ubuntu-latest
    environment: pull-request
    strategy:
      matrix:
        image:
          - name: local-csi-driver
            dockerfile: Dockerfile
          - name: local-csi-manager
            dockerfile: Dockerfile.manager
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Azure CLI Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login -n ${{ inputs.registry }}

      - name: Create and push manifest
        run: |
          set -eou pipefail
          tags=()
          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi
            tags+=("${{ inputs.registry }}/${{ inputs.repo_base }}/${{ matrix.image.name }}:${tag}")
          done <<< "${{ inputs.tags }}"

          for tag in "${tags[@]}"; do
            docker buildx imagetools create \
              -t "$tag" \
              "$tag-amd64" \
              "$tag-arm64"
          done
