name: Docker Build Template

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to check out'
        required: false
        type: string
        default: ${{ github.ref }}
      version:
        description: 'Version string passed as build arg (compiled into binary)'
        required: true
        type: string
      artifact_retention_days:
        description: 'Retention for uploaded image tarball artifacts'
        required: false
        type: number
        default: 1

permissions:
  contents: read

jobs:
  build-docker:
    timeout-minutes: 30
    strategy:
      matrix:
        image:
          - name: local-csi-driver
            dockerfile: Dockerfile
          - name: local-csi-manager
            dockerfile: Dockerfile.manager
        arch:
          - runs-on: ubuntu-latest
            platforms: linux/amd64
            tag-suffix: amd64
          - runs-on: ubuntu-24.04-arm
            platforms: linux/arm64
            tag-suffix: arm64
    runs-on: ${{ matrix.arch.runs-on }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate NOTICE.txt
        run: make notice

      - name: Set build date
        id: build-date
        run: echo "date=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"

      - name: Docker build (export tarball)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          # Stable placeholder tag - the push template / PR test retags
          # into the destination namespace before pushing or kind-loading.
          tags: local/${{ matrix.image.name }}:build
          platforms: ${{ matrix.arch.platforms }}
          outputs: type=docker,dest=/tmp/${{ matrix.image.name }}-${{ matrix.arch.tag-suffix }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ID=${{ github.run_id }}
            VERSION=${{ inputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.date }}

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-${{ matrix.image.name }}-${{ matrix.arch.tag-suffix }}
          path: /tmp/${{ matrix.image.name }}-${{ matrix.arch.tag-suffix }}.tar
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: error
