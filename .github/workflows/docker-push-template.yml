name: Docker Push Template

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry URL'
        required: true
        type: string
      repo_base:
        description: 'Repository base path'
        required: true
        type: string
      tags:
        description: 'Image tags (newline-separated list)'
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  push-arch:
    strategy:
      matrix:
        image:
          - name: local-csi-driver
          - name: local-csi-manager
        arch:
          - tag-suffix: amd64
          - tag-suffix: arm64
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pull-request
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Refuse to push from untrusted refs
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "::error::This template must only be invoked from refs/heads/main or refs/tags/v*, got: ${GITHUB_REF}"
          exit 1

      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-${{ matrix.image.name }}-${{ matrix.arch.tag-suffix }}
          path: /tmp/image

      - name: Load image into docker
        env:
          IMAGE_NAME: ${{ matrix.image.name }}
          TAG_SUFFIX: ${{ matrix.arch.tag-suffix }}
        run: |
          set -eou pipefail
          tar="/tmp/image/${IMAGE_NAME}-${TAG_SUFFIX}.tar"
          if [[ ! -f "$tar" ]]; then
            echo "Expected artifact $tar not found" >&2
            exit 1
          fi
          docker load -i "$tar"

      - name: Azure CLI Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        env:
          REGISTRY: ${{ inputs.registry }}
        run: az acr login -n "${REGISTRY}"

      - name: Retag and push
        env:
          REGISTRY: ${{ inputs.registry }}
          REPO_BASE: ${{ inputs.repo_base }}
          IMAGE_NAME: ${{ matrix.image.name }}
          TAG_SUFFIX: ${{ matrix.arch.tag-suffix }}
          TAGS: ${{ inputs.tags }}
        run: |
          set -eou pipefail
          # Build template saves images under the placeholder local/<name>:build.
          # Retag into the destination namespace for each requested tag.
          src="local/${IMAGE_NAME}:build"
          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi
            image="${REGISTRY}/${REPO_BASE}/${IMAGE_NAME}:${tag}-${TAG_SUFFIX}"
            echo "Tagging $src -> $image"
            docker tag "$src" "$image"
            echo "Pushing $image"
            docker push "$image"
          done <<< "${TAGS}"

  push-manifest:
    needs: push-arch
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pull-request
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        image:
          - name: local-csi-driver
          - name: local-csi-manager
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Refuse to push from untrusted refs
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "::error::This template must only be invoked from refs/heads/main or refs/tags/v*, got: ${GITHUB_REF}"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Azure CLI Login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        env:
          REGISTRY: ${{ inputs.registry }}
        run: az acr login -n "${REGISTRY}"

      - name: Create and push manifest
        env:
          REGISTRY: ${{ inputs.registry }}
          REPO_BASE: ${{ inputs.repo_base }}
          IMAGE_NAME: ${{ matrix.image.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          set -eou pipefail
          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi
            base="${REGISTRY}/${REPO_BASE}/${IMAGE_NAME}:${tag}"
            echo "Creating manifest $base"
            docker buildx imagetools create \
              -t "$base" \
              "$base-amd64" \
              "$base-arm64"
          done <<< "${TAGS}"
