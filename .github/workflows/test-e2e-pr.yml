name: E2E Tests (PR)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release-**]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.x"
  REGISTRY: "localcsidriver.azurecr.io"
  REPO_BASE: "acstor"
  TAG: "v0.0.1-pr"

jobs:
  build-docker:
    uses: ./.github/workflows/docker-build-template.yml
    with:
      # Default checkout (merge ref) is the safe default for pull_request.
      version: "v0.0.1-pr"

  build-helm:
    uses: ./.github/workflows/helm-build-template.yml
    with:
      registry: "localcsidriver.azurecr.io"
      repo_base: "acstor"
      tags: "v0.0.1-pr"

  kind-test:
    needs: [build-docker, build-helm]
    name: ${{ matrix.test.name }} (${{ matrix.arch.tag-suffix }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch:
          - runs-on: ubuntu-latest
            tag-suffix: amd64
          - runs-on: ubuntu-24.04-arm
            tag-suffix: arm64
        test:
          - name: Kind E2E
            slug: e2e
            make-target: test-e2e
            kind-args: --kind-nodes 1 --kind-setup-vg
            extra-helm: ""
          - name: Kind External E2E
            slug: external-e2e
            make-target: test-external-e2e
            kind-args: --kind-nodes 3 --kind-setup-vg
            extra-helm: ""
          - name: Kind Sanity
            slug: sanity
            make-target: test-sanity
            kind-args: --kind-nodes 1 --kind-setup-vg
            extra-helm: --set cleanup.lvGarbageCollection.enabled=false --set cleanup.lvmOrphanCleanup.enabled=false
        exclude:
          # external-e2e and sanity work on arm64 too, but to save CI minutes
          # we only run them on amd64. Plain e2e still runs on both arches.
          - arch: { runs-on: ubuntu-24.04-arm, tag-suffix: arm64 }
            test: { name: Kind External E2E, slug: external-e2e, make-target: test-external-e2e, kind-args: --kind-nodes 3 --kind-setup-vg, extra-helm: "" }
          - arch: { runs-on: ubuntu-24.04-arm, tag-suffix: arm64 }
            test: { name: Kind Sanity, slug: sanity, make-target: test-sanity, kind-args: --kind-nodes 1 --kind-setup-vg, extra-helm: --set cleanup.lvGarbageCollection.enabled=false --set cleanup.lvmOrphanCleanup.enabled=false }
    runs-on: ${{ matrix.arch.runs-on }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download driver image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-local-csi-driver-${{ matrix.arch.tag-suffix }}
          path: /tmp/image

      - name: Download manager image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: image-local-csi-manager-${{ matrix.arch.tag-suffix }}
          path: /tmp/image

      - name: Download helm chart
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: helm-charts
          path: /tmp/helm

      - name: Load images into docker and retag for kind
        env:
          TAG_SUFFIX: ${{ matrix.arch.tag-suffix }}
        run: |
          set -eou pipefail
          for tar in "/tmp/image/local-csi-driver-${TAG_SUFFIX}.tar" "/tmp/image/local-csi-manager-${TAG_SUFFIX}.tar"; do
            if [[ ! -f "$tar" ]]; then
              echo "Expected artifact $tar not found" >&2
              exit 1
            fi
            docker load -i "$tar"
          done
          # Retag from the build template's placeholder (local/<name>:build)
          # to the registry path the helm chart references. The e2e framework
          # will subsequently `kind load` these into the cluster nodes.
          for img in local-csi-driver local-csi-manager; do
            docker tag \
              "local/${img}:build" \
              "${REGISTRY}/${REPO_BASE}/${img}:${TAG}"
          done

      - name: Create kind cluster
        run: |
          # Ensure kind binary is on PATH for any in-suite invocations
          # (e.g. external-e2e's `kind load docker-image` in BeforeSuite).
          make kind
          echo "${PWD}/bin" >> "$GITHUB_PATH"

      - name: Setup TestRunId
        env:
          TAG_SUFFIX: ${{ matrix.arch.tag-suffix }}
          SLUG: ${{ matrix.test.slug }}
        run: |
          TEST_RUN_ID="${{ github.run_id }}-kind-${SLUG}-${TAG_SUFFIX}-${{ github.run_attempt }}"
          echo "TestRunId=${TEST_RUN_ID}" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.test.name }}
        env:
          MAKE_TARGET: ${{ matrix.test.make-target }}
          KIND_ARGS: ${{ matrix.test.kind-args }}
          EXTRA_HELM: ${{ matrix.test.extra-helm }}
        run: |
          # PR builds never push to ACR. The suite consumes the pre-built chart
          # with pullPolicy=IfNotPresent so kubelet uses the locally-loaded
          # image instead of trying to pull from the registry.
          # shellcheck disable=SC2086  # KIND_ARGS intentionally word-splits.
          python .github/workflows/scripts/run_tests.py \
            --command "make ${MAKE_TARGET} REGISTRY=${REGISTRY} REPO_BASE=${REPO_BASE} TAG=${TAG} INSTALLATION_METHOD=localHelm CHART_SOURCE=/tmp/helm/local-csi-driver-${TAG#v}.tgz SKIP_BUILD=true HELM_ARGS='--set image.driver.pullPolicy=IfNotPresent --set image.manager.pullPolicy=IfNotPresent ${EXTRA_HELM}'" \
            --cluster-type kind ${KIND_ARGS}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-artifacts-${{ env.TestRunId }}
          path: |
            ./support-bundles
            ./JUnit.xml
          retention-days: 14
          if-no-files-found: warn
          overwrite: false

      - name: Publish Test Summary
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        if: always()
        with:
          paths: ./JUnit.xml
