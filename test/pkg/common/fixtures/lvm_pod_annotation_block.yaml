apiVersion: v1
kind: Pod
metadata:
  name: lvm-pod-annotation-block
  labels:
    app: busybox
    part-of: e2e-test
spec:
  nodeSelector:
    "kubernetes.io/os": linux
  containers:
    - name: statefulset-lcd
      image: mcr.microsoft.com/azurelinux/busybox:1.36
      command:
        - "/bin/sh"
        - "-c"
        - set -euo pipefail; trap exit TERM; while true; do date -u +"%Y-%m-%dT%H:%M:%SZ" | dd of=/dev/lcd bs=512 count=1 conv=notrunc 2>/dev/null; sleep 1; done
      volumeDevices:
        - name: persistent-storage
          devicePath: /dev/lcd
  volumes:
    - name: persistent-storage
      persistentVolumeClaim:
        claimName: lvm-pvc-annotation-block
