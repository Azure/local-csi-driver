apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    part-of: e2e-test
  annotations:
    localdisk.csi.acstor.io/accept-ephemeral-storage: "true"
  name: lvm-pvc-annotation-block
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  resources:
    requests:
      storage: 10Gi
  storageClassName: local
