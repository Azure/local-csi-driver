apiVersion: v1
kind: Pod
metadata:
  name: fake-pod
  namespace: default
  labels:
    app: fake-pod
    type: kwok
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: type
                operator: In
                values:
                  - kwok
  tolerations:
    - key: "kwok.x-k8s.io/node"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: fake-container
      image: fake-image
