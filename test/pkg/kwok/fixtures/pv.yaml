apiVersion: v1
kind: PersistentVolume
metadata:
  name: kwok-pv-0
  labels:
    type: kwok
spec:
  storageClassName: kwok-synthetic
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: kwok.synthetic.local
    volumeHandle: kwok-synthetic
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kwok-synthetic-node
