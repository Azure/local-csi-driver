---
# StatefulSet example with the Cluster Autoscaler workaround using a
# volumeClaimTemplate PVC with the accept-ephemeral-storage annotation.
#
# The Kubernetes Cluster Autoscaler does not consider CSIStorageCapacity when
# simulating scale-up, so pods that are Pending due to insufficient local NVMe
# capacity may not trigger a new node. Adding a required pod anti-affinity on
# kubernetes.io/hostname forces the autoscaler to base its scale-up decisions
# on placement constraints rather than storage capacity. See
# docs/user-guide.md for details.
#
# Starts with 3 replicas; scale up (e.g. `kubectl scale sts
# statefulset-lcd-lvm-annotation --replicas=N`) to exercise
# autoscaler-driven node scale-up.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-lcd-lvm-annotation
  labels:
    app: busybox
spec:
  podManagementPolicy: Parallel  # default is OrderedReady
  replicas: 3
  template:
    metadata:
      labels:
        app: busybox
    spec:
      nodeSelector:
        "kubernetes.io/os": linux
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: busybox
              topologyKey: kubernetes.io/hostname
      containers:
        - name: statefulset-lcd
          image: mcr.microsoft.com/azurelinux/busybox:1.36
          command:
            - "/bin/sh"
            - "-c"
            - set -euo pipefail; trap exit TERM; while true; do date -u +"%Y-%m-%dT%H:%M:%SZ" >> /mnt/lcd/outfile; sleep 1; done
          volumeMounts:
            - name: persistent-storage
              mountPath: /mnt/lcd
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: busybox
  volumeClaimTemplates:
    - metadata:
        name: persistent-storage
        annotations:
          localdisk.csi.acstor.io/accept-ephemeral-storage: "true"
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local
        resources:
          requests:
            storage: 10Gi
